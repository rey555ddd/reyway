<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非公開文件 · REYWAY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F4F0;--surface:#FFF;--text:#1C1C1E;--text-2:#6E6E73;--text-3:#AEAEB2;--border:rgba(0,0,0,0.06);--shadow:0 2px 16px rgba(0,0,0,0.06),0 1px 4px rgba(0,0,0,0.04);--shadow-hover:0 8px 32px rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.06);--radius:18px;--radius-sm:12px}
body{font-family:"Inter","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:0 20px}

.topbar{position:sticky;top:0;z-index:10;background:rgba(245,244,240,0.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 0}
.topbar-inner{display:flex;align-items:center;gap:12px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-2);text-decoration:none;padding:6px 14px;border-radius:100px;background:var(--surface);box-shadow:var(--shadow);white-space:nowrap}
.back-btn:hover{box-shadow:var(--shadow-hover)}
.topbar h1{font-size:1rem;font-weight:700;flex:1}

.hero{padding:36px 0 28px;text-align:center}
.hero h2{font-size:1.5rem;font-weight:700;margin-bottom:8px}
.hero p{font-size:0.88rem;color:var(--text-2);line-height:1.6}

.section-label{font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px}

.doc-list{display:flex;flex-direction:column;gap:12px;padding-bottom:60px}

.doc-card{background:var(--surface);border-radius:var(--radius-sm);padding:20px 22px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;transition:box-shadow .2s,transform .2s;border-left:3px solid transparent}
.doc-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.doc-card.restricted{border-left-color:#FF3B30}
.doc-icon{font-size:1.4rem;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#F5F4F0}
.doc-icon.red{background:#FFF0EF;color:#FF3B30}
.doc-body{flex:1;min-width:0}
.doc-title{font-size:0.95rem;font-weight:700;margin-bottom:4px}
.doc-desc{font-size:0.80rem;color:var(--text-2);line-height:1.5;margin-bottom:6px}
.doc-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.doc-tag{font-size:0.68rem;font-weight:600;padding:3px 9px;border-radius:100px;background:rgba(255,59,48,0.08);color:#FF3B30}
.doc-date{font-size:0.72rem;color:var(--text-3)}
.doc-arrow{font-size:1rem;color:var(--text-3);flex-shrink:0}

.notice-box{background:rgba(255,59,48,0.06);border:1px solid rgba(255,59,48,0.15);border-radius:12px;padding:14px 18px;margin-bottom:32px;display:flex;align-items:flex-start;gap:10px}
.notice-box-icon{color:#FF3B30;font-size:1.1rem;flex-shrink:0;margin-top:1px}
.notice-box-text{font-size:0.82rem;color:var(--text-2);line-height:1.6}

#auth-gate{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center}
#auth-gate.hidden{display:none}
</style>
</head>
<body>

<div id="auth-gate"><div style="color:#AEAEB2;font-size:.9rem">驗證中…</div></div>

<div class="topbar"><div class="wrap topbar-inner">
  <a class="back-btn" href="/"><i class="ph ph-arrow-left"></i> 返回總站</a>
  <h1><i class="ph ph-lock-key"></i> 非公開文件</h1>
</div></div>

<div class="wrap">
  <div class="hero">
    <h2>非公開文件</h2>
    <p>這裡的文件僅供內部使用，網址需個別分享。<br>請勿將此頁連結對外傳播。</p>
  </div>

  <div class="notice-box">
    <i class="ph ph-warning notice-box-icon"></i>
    <div class="notice-box-text">以下文件屬機密性質。若您誤入此頁，請關閉瀏覽器視窗。如需取得文件，請聯繫相關負責人。</div>
  </div>

  <div class="section-label">機密文件</div>
  <div class="doc-list">

    <a class="doc-card restricted" href="/private/hr-plan/">
      <div class="doc-icon red"><i class="ph ph-users-three"></i></div>
      <div class="doc-body">
        <div class="doc-title">6月縮編計畫</div>
        <div class="doc-desc">行銷部 30% + 設計部 50%，合意終止執行方案<br>費用試算、執行時程、人員名單</div>
        <div class="doc-meta">
          <span class="doc-tag">機密</span>
          <span class="doc-date">2026-06-01</span>
        </div>
      </div>
      <div class="doc-arrow"><i class="ph ph-arrow-right"></i></div>
    </a>

  </div>
</div>

<script>
(function(){
  try{
    var s=JSON.parse(localStorage.getItem("reyway_gauth")||"null");
    if(s&&s.expiry>Date.now()){
      document.getElementById("auth-gate").classList.add("hidden");
      return;
    }
  }catch(e){}
  window.location.href="/";
})();
</script>
</body>
</html>
